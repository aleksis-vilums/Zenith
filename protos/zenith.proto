syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.zenith.bu";
option java_outer_classname = "ZenithService";
option objc_class_prefix = "ZEN";

package zenith;

//Zenith Service
service Zenith {
    //Hello World Unary RPC
    rpc SayHello (HelloRequest) returns (HelloReply) {}

    //market Ticks Server Stream RPC
    rpc GenerateTicks (TickRequest) returns (stream TickResponse) {}
}

message HelloRequest {
    string name = 1;
}

message HelloReply {
    string message = 1;
}

message TickRequest {
    string tick = 1;
}

message TickResponse {
    string tick = 1;
    double price = 2;
    int32 date = 3;
}